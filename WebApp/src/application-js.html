<script>
// =========================================================
//  STATE
// =========================================================
var disclaimer = '';
var category   = '';

var FIELD_MESSAGES = {
  selectedProfessional: 'Please select a professional.',
  requesterEmail:       'Please enter a contact email.',
  age:                  'Please enter your age.',
  genderchoice:         'Please select a gender.',
  category:             'Please select a topic category.',
  problemExplained:     'Please describe your situation.',
  topics:               'Please select at least one topic.'
};

// =========================================================
//  BOOTSTRAP
// =========================================================
window.onload = function () {
  google.script.run
    .withSuccessHandler(onPopupsLoaded)
    .withFailureHandler(function () { showPage(); })
    .getPopups();
};

function onPopupsLoaded(combinedObjStr) {
  try {
    var obj = JSON.parse(combinedObjStr);
    disclaimer = obj.disclaimer || '';
  } catch (e) {
    disclaimer = '';
  }
  showPage();
}

// =========================================================
//  CATEGORY SELECTION
// =========================================================
function setCat(cat) {
  category = cat;

  // Update hidden input
  var hiddenInput = document.getElementById('category');
  if (hiddenInput) hiddenInput.value = cat;

  // Visual feedback
  var disp = document.getElementById('dispCat');
  if (disp) disp.textContent = 'Selected: ' + cat;

  // Toggle pill active state
  document.querySelectorAll('.cat-pill').forEach(function (pill) {
    pill.classList.toggle('active', pill.textContent.trim() === cat);
  });
}

// =========================================================
//  SUBMIT FLOW
// =========================================================
function submitClicked() {
  var failures = checkValidations();
  if (failures.length) {
    showToast(failures.map(function (id) { return FIELD_MESSAGES[id]; }).join(' '), 'error');
    return;
  }

  if (disclaimer) {
    openModal('disclaimerModal', disclaimer, 'Disclaimer', function () { submitForm(); });
  } else {
    submitForm();
  }
}

function checkValidations() {
  var failures = [];

  Object.keys(FIELD_MESSAGES).forEach(function (id) {
    var valid;
    if (id === 'genderchoice') {
      valid = !!getChecked('.with-gap').length;
    } else if (id === 'topics') {
      valid = !!getChecked('.filled-in').length;
    } else if (id === 'category') {
      valid = category !== '';
    } else {
      var el = document.getElementById(id);
      valid = el && el.value.trim() !== '' && el.checkValidity();
    }
    if (!valid) failures.push(id);
  });

  return failures;
}

function getChecked(selector) {
  return Array.prototype.filter.call(
    document.querySelectorAll(selector),
    function (el) { return el.checked; }
  ).map(function (el) { return el.value; });
}

function submitForm() {
  showBoth();
  disableButton();

  var request = {};
  Object.keys(FIELD_MESSAGES).forEach(function (id) {
    if (id === 'genderchoice') {
      request[id] = getChecked('.with-gap')[0] || '';
    } else if (id === 'topics') {
      request[id] = getChecked('.filled-in').join(',');
    } else if (id === 'category') {
      request[id] = category;
    } else {
      var el = document.getElementById(id);
      request[id] = el ? el.value.trim() : '';
    }
  });

  google.script.run
    .withSuccessHandler(onRequestSuccess)
    .withFailureHandler(onRequestError)
    .receiveRequest(request);
}

function onRequestSuccess(confirm) {
  if (!confirm) {
    showPage();
    enableButton();
    showToast('Something went wrong. Please try again.', 'error');
    return;
  }

  showToast('Request submitted!', 'success');
  openModal(
    'successModal',
    '<p>Your request has been received and forwarded to the professional.</p>' +
    '<p>Please follow the instructions in the confirmation email you will receive.</p>' +
    '<p>You will be redirected back to the professionals page shortly.</p>',
    'Request Received!',
    function () { redirectToMain(); }
  );
  setTimeout(redirectToMain, 5000);
}

function onRequestError() {
  showPage();
  enableButton();
  showToast('A network error occurred. Please try again.', 'error');
}

function redirectToMain() {
  window.location.href = '?';
}

// =========================================================
//  BUTTON STATE
// =========================================================
function disableButton() {
  var btn = document.getElementById('submitButton');
  if (btn) { btn.disabled = true; btn.classList.add('disabled'); }
}

function enableButton() {
  var btn = document.getElementById('submitButton');
  if (btn) { btn.disabled = false; btn.classList.remove('disabled'); }
}

// =========================================================
//  MODAL
// =========================================================
function openModal(id, bodyHtml, title, confirmCallback) {
  var backdrop = document.getElementById(id);
  if (!backdrop) {
    backdrop = buildModal(id, confirmCallback);
    document.body.appendChild(backdrop);
  } else if (confirmCallback) {
    var confirmBtn = backdrop.querySelector('.btn-confirm');
    if (confirmBtn) confirmBtn.onclick = function () { closeModal(id); confirmCallback(); };
  }
  backdrop.querySelector('.modal-title').textContent = title || '';
  backdrop.querySelector('.modal-body').innerHTML    = bodyHtml || '';
  backdrop.classList.add('open');
}

function closeModal(id) {
  var el = document.getElementById(id);
  if (el) el.classList.remove('open');
}

function buildModal(id, confirmCallback) {
  var backdrop = document.createElement('div');
  backdrop.id = id;
  backdrop.className = 'modal-backdrop';

  var hasConfirm = !!confirmCallback;
  var footerHtml = hasConfirm
    ? '<button class="btn-secondary modal-close-btn" onclick="closeModal(\'' + id + '\')">Cancel</button>' +
      '<button class="btn-primary btn-confirm">Agree & Continue</button>'
    : '<button class="btn-primary" onclick="closeModal(\'' + id + '\')">Got it</button>';

  backdrop.innerHTML =
    '<div class="modal-box">' +
      '<div class="modal-header">' +
        '<span class="modal-title"></span>' +
        '<button class="modal-close" onclick="closeModal(\'' + id + '\')">&times;</button>' +
      '</div>' +
      '<div class="modal-body"></div>' +
      '<div class="modal-footer">' + footerHtml + '</div>' +
    '</div>';

  if (hasConfirm) {
    backdrop.querySelector('.btn-confirm').addEventListener('click', function () {
      closeModal(id);
      confirmCallback();
    });
  }

  backdrop.addEventListener('click', function (e) {
    if (e.target === backdrop) closeModal(id);
  });

  return backdrop;
}

// =========================================================
//  TOAST
// =========================================================
function showToast(message, type) {
  var container = document.getElementById('toastContainer');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toastContainer';
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  var toast = document.createElement('div');
  toast.className = 'toast' + (type ? ' ' + type : '');
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function () { toast.remove(); }, 4000);
}

// =========================================================
//  VISIBILITY HELPERS
// =========================================================
function loadingFunction() { showBoth(); }

function showPage() {
  show('main',    true);
  show('overlay', false);
}

function showBoth() {
  show('main',    true);
  show('overlay', true);
}

function show(id, value) {
  var el = document.getElementById(id);
  if (el) el.style.display = value ? '' : 'none';
}
</script>
