<script>
// =========================================================
//  STATE
// =========================================================
var popupsObj = {};
var activeSearch = '';
var activeTopics = [];

// =========================================================
//  BOOTSTRAP
// =========================================================
window.onload = function () {
  detectDevice();
  google.script.run
    .withSuccessHandler(onPopupsLoaded)
    .withFailureHandler(onScriptError)
    .getPopups();
};

function detectDevice() {
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  var pcView  = document.getElementById('PCView');
  var mobView = document.getElementById('MOBView');

  if (isMobile) {
    if (pcView)  pcView.innerHTML  = '';
  } else {
    if (mobView) mobView.innerHTML = '';
  }

  google.script.run.addToLog({ device: isMobile ? 'Mobile' : 'PC' });
}

// =========================================================
//  POPUPS / WELCOME
// =========================================================
function onPopupsLoaded(combinedObjStr) {
  var combinedObj = JSON.parse(combinedObjStr);
  popupsObj = combinedObj.popupsObj || {};
  showPage();
  buildFilterChips();
  updateResultsMeta();
  showWelcomeModal(combinedObj.welcomeNote);
}

function showWelcomeModal(note) {
  if (!note) return;
  openModal('welcomeModal', note, 'Welcome!');
}

// =========================================================
//  SEARCH & FILTER
// =========================================================
document.addEventListener('DOMContentLoaded', function () {
  var searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', function () {
      activeSearch = this.value.toLowerCase().trim();
      applyFilters();
    });
  }

  var filterClear = document.getElementById('filterClear');
  if (filterClear) {
    filterClear.addEventListener('click', clearFilters);
  }
});

function buildFilterChips() {
  var container = document.getElementById('filterChips');
  if (!container) return;

  var cards = getVisibleGrid().querySelectorAll('.pro-card');
  var topicSet = {};

  cards.forEach(function (card) {
    var raw = card.getAttribute('data-topics') || '';
    raw.split(',').forEach(function (t) {
      var trimmed = t.trim();
      if (trimmed) topicSet[trimmed] = true;
    });
  });

  Object.keys(topicSet).sort().forEach(function (topic) {
    var btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = topic;
    btn.addEventListener('click', function () { toggleTopic(topic, btn); });
    container.appendChild(btn);
  });
}

function toggleTopic(topic, btn) {
  var idx = activeTopics.indexOf(topic);
  if (idx === -1) {
    activeTopics.push(topic);
    btn.classList.add('active');
  } else {
    activeTopics.splice(idx, 1);
    btn.classList.remove('active');
  }
  updateClearButton();
  applyFilters();
}

function clearFilters() {
  activeSearch = '';
  activeTopics = [];

  var searchInput = document.getElementById('searchInput');
  if (searchInput) searchInput.value = '';

  document.querySelectorAll('.chip').forEach(function (c) { c.classList.remove('active'); });
  updateClearButton();
  applyFilters();
}

function updateClearButton() {
  var btn = document.getElementById('filterClear');
  if (!btn) return;
  btn.style.display = (activeSearch || activeTopics.length) ? '' : 'none';
}

function applyFilters() {
  var grid = getVisibleGrid();
  if (!grid) return;
  var cards = grid.querySelectorAll('.pro-card');
  var visible = 0;

  cards.forEach(function (card) {
    var matchesSearch = !activeSearch ||
      (card.getAttribute('data-name')   || '').toLowerCase().includes(activeSearch) ||
      (card.getAttribute('data-title')  || '').toLowerCase().includes(activeSearch) ||
      (card.getAttribute('data-topics') || '').toLowerCase().includes(activeSearch);

    var matchesTopic = activeTopics.length === 0 || activeTopics.some(function (t) {
      return (card.getAttribute('data-topics') || '').toLowerCase().includes(t.toLowerCase());
    });

    if (matchesSearch && matchesTopic) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });

  var noResults = document.getElementById('noResults');
  if (noResults) noResults.style.display = visible === 0 ? '' : 'none';

  updateResultsMeta(visible, cards.length);
}

function updateResultsMeta(visible, total) {
  var meta = document.getElementById('resultsMeta');
  if (!meta) return;
  if (visible === undefined) {
    var grid = getVisibleGrid();
    if (!grid) return;
    total   = grid.querySelectorAll('.pro-card').length;
    visible = grid.querySelectorAll('.pro-card:not(.hidden)').length;
  }
  meta.textContent = visible + ' of ' + total + ' professionals';
}

function getVisibleGrid() {
  var pc  = document.getElementById('PCView');
  var mob = document.getElementById('MOBView');
  if (pc  && pc.innerHTML.trim()  !== '') return pc;
  if (mob && mob.innerHTML.trim() !== '') return mob;
  return null;
}

// =========================================================
//  MORE INFO MODAL
// =========================================================
function moreInfo(name) {
  var content = popupsObj[name] || '<p>No additional information available.</p>';
  openModal('infoModal', content, name);
}

// =========================================================
//  GENERIC MODAL
// =========================================================
function openModal(id, bodyHtml, title) {
  var backdrop = document.getElementById(id);
  if (!backdrop) {
    backdrop = createModalElement(id);
    document.body.appendChild(backdrop);
  }
  backdrop.querySelector('.modal-title').textContent = title || '';
  backdrop.querySelector('.modal-body').innerHTML    = bodyHtml || '';
  backdrop.classList.add('open');
}

function closeModal(id) {
  var backdrop = document.getElementById(id);
  if (backdrop) backdrop.classList.remove('open');
}

function createModalElement(id) {
  var backdrop = document.createElement('div');
  backdrop.id = id;
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML =
    '<div class="modal-box">' +
      '<div class="modal-header">' +
        '<span class="modal-title"></span>' +
        '<button class="modal-close" onclick="closeModal(\'' + id + '\')">&times;</button>' +
      '</div>' +
      '<div class="modal-body"></div>' +
      '<div class="modal-footer">' +
        '<button class="btn-primary" onclick="closeModal(\'' + id + '\')">Got it</button>' +
      '</div>' +
    '</div>';

  backdrop.addEventListener('click', function (e) {
    if (e.target === backdrop) closeModal(id);
  });

  return backdrop;
}

// =========================================================
//  VISIBILITY HELPERS
// =========================================================
function loadingFunction() { showBoth(); }

function showPage() {
  show('main',    true);
  show('overlay', false);
}

function showBoth() {
  show('main',    true);
  show('overlay', true);
}

function show(id, value) {
  var el = document.getElementById(id);
  if (el) el.style.display = value ? '' : 'none';
}

// =========================================================
//  ERROR HANDLER
// =========================================================
function onScriptError(err) {
  showPage();
}
</script>
