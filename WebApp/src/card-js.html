<script>
var popupsObj = {};
var device;

window.onload = function () {
  google.script.run
    .withSuccessHandler(setPopupsObj)
    .withFailureHandler(function () { showPage(); })
    .getPopups();

  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  device = isMobile ? 'Mobile' : 'PC';
  google.script.run.addToLog({ device: device });
};

function setPopupsObj(popupsObjStr) {
  try {
    popupsObj = JSON.parse(popupsObjStr) || {};
  } catch (e) {
    popupsObj = {};
  }
  showPage();
}

function moreInfo(name) {
  var content = popupsObj[name] || '<p>No additional information available.</p>';
  openModal('cardInfoModal', content, name);
}

// ---- Generic modal (same pattern as index-js) ----
function openModal(id, bodyHtml, title) {
  var backdrop = document.getElementById(id);
  if (!backdrop) {
    backdrop = createModalElement(id);
    document.body.appendChild(backdrop);
  }
  backdrop.querySelector('.modal-title').textContent = title || '';
  backdrop.querySelector('.modal-body').innerHTML    = bodyHtml || '';
  backdrop.classList.add('open');
}

function closeModal(id) {
  var backdrop = document.getElementById(id);
  if (backdrop) backdrop.classList.remove('open');
}

function createModalElement(id) {
  var backdrop = document.createElement('div');
  backdrop.id = id;
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML =
    '<div class="modal-box">' +
      '<div class="modal-header">' +
        '<span class="modal-title"></span>' +
        '<button class="modal-close" onclick="closeModal(\'' + id + '\')">&times;</button>' +
      '</div>' +
      '<div class="modal-body"></div>' +
      '<div class="modal-footer">' +
        '<button class="btn-primary" onclick="closeModal(\'' + id + '\')">Close</button>' +
      '</div>' +
    '</div>';
  backdrop.addEventListener('click', function (e) {
    if (e.target === backdrop) closeModal(id);
  });
  return backdrop;
}

// ---- Visibility helpers ----
function loadingFunction() { showBoth(); }

function showPage() {
  show('main',    true);
  show('overlay', false);
}

function showBoth() {
  show('main',    true);
  show('overlay', true);
}

function show(id, value) {
  var el = document.getElementById(id);
  if (el) el.style.display = value ? '' : 'none';
}
</script>
